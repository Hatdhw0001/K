        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
            color: #ff6b6b;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        .config-info {
            margin-top: 15px;
        }
        .config-info p {
            margin: 5px 0;
            font-size: 1.5em;
            color: #ff6b6b;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 3fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .game-card h3 {
            margin: 10px 0;
            color: #f8a5c2;
            font-size: 1.2em;
        }
        .game-card .play-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .game-card .play-btn:hover {
            background: linear-gradient(45deg, #ff8e8e, #ff6b6b);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9em;
        }
               .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: linear-gradient(45deg, #ff8e8e, #ff6b6b);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
    </style>
</head>

    <script>
        // 通过 get_config.php 接口获取配置信息
        fetch('get_config.php')
            .then(response => response.json())
            .then(data => {
                const configInfo = document.getElementById('config-info');
                configInfo.innerHTML = `
                    <p>${data.description}</p>
                    <p>${data.copyright}</p>
                `;
            })
            .catch(error => {
                console.error('认准 花傲天.top:', error);
                const configInfo = document.getElementById('config-info');
                configInfo.innerHTML = '<p>认准 花傲天.top</p>';
            });
    </script>
